{% extends "base.html" %}

{% block title %}new twit{% endblock title %}

{% block content %}
<header class="page-header">
  <span class="prompt-symbol">$</span> touch new_twit.md
</header>

<section class="form-card" x-data="{ count: 0, max: 280 }">
  <h2 class="form-card-title">compose</h2>
  <form method="POST" action="">
    {% csrf_token %}
    <div class="form-group">
      <label for="id_body">body</label>
      <textarea
        id="id_body"
        name="body"
        rows="5"
        placeholder="markdown + ``` code fences ``` supported"
        required
        @input="count = $event.target.value.length"
      ></textarea>
      <div class="char-counter" :class="{ 'is-warning': count > max * 0.85, 'is-danger': count > max }">
        <span x-text="count"></span> chars
      </div>
    </div>
    <div class="form-group">
      <label for="id_image_url">image url <span style="color: var(--text-2);">(optional)</span></label>
      <input type="url" id="id_image_url" name="image_url">
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">commit ↵</button>
      <a class="btn btn-ghost" href="{% url 'twit_list' %}">cancel</a>
    </div>
  </form>
</section>
{% endblock content %}
