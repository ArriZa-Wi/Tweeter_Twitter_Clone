{% extends "base.html" %}
{% load crispy_forms_tags %}


{% block title %}Create Twit{% endblock title %}

{% block content %}
  <div class="card shadow-sm mb-4">
    <div class="card-header">
      <h2>Create New Twit</h2>
    </div>
    <div class="card-body">
      <form action="" method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="mt-3">
          <button class="btn btn-success" type="submit">Save</button>
          <a href="{% url 'twit_list' %}" class="btn btn-outline-secondary ml-2">Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock content %}
