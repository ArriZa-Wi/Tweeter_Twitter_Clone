{% extends "base.html" %}
{% load crispy_forms_tags %}


{% block title %}Change Your Profile{% endblock %}

{% block content %}
  <div class="container mt-4">
    <h2>Change Your Profile</h2>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <button class="btn btn-success" type="submit">Update</button>
      <a class="btn btn-outline-primary float-end" href="{% url 'password_change' %}">Change Password</a>
    </form>
  </div>
{% endblock %}
