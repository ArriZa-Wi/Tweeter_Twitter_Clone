{% load static %}


<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>{% block title %}Tweeter App{% endblock title %}</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand text-white" href="{% url 'home' %}">Tweeter</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav ms-auto">
            {% if user.is_authenticated %}
            <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0 pe-5">
              <li><a href="{% url 'twit_create' %}" class="btn btn-outline-light me-2">+ New Twit</a></li>
              <li><a href="{% url 'profile_detail' %}" class="btn btn-outline-light">Profile</a></li>
            </ul>
            <div class="dropdown text-end pe-5">
              <a 
                  href="#" 
                  class="d-block link-light text-decoration-none dropdown-toggle"
                  id="dropdownUser1" 
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
              >
                  Hi, {{ user.username }}!
              </a>
              <ul class="dropdown-menu text-small" aria-labelledby="dropdownUser1">
                <li><a class="dropdown-item" href="{% url 'password_change' %}">Change password</a></li>
                <li><a class="dropdown-item" href="{% url 'logout' %}">Logout</a></li>
              </ul>
            </div>
          {% else %}
            <div class="text-end">
              <a href="{% url 'login' %}" class="btn btn-outline-light me-2">Login</a>
              <a href="{% url 'signup' %}" class="btn btn-success">Sign Up</a>
            </div>
          {% endif %}          
          </div>
        </div>
      </div>
    </nav>
    
    <div class="container">
      <figure class="text">
        <blockquote class="blockquote">
          <div class="mt-3 my-3 py-2 border-bottom border-2">
            {% block header %}
            {% endblock header %}
          </div>
        </blockquote>
      </figure>
      {% block content %}
      {% endblock content %}
    </div>

    <!-- jQuery JS Bundle -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Custom JS -->
    <script src="{% static 'js/base.js' %}"></script>
  </body>
</html>
