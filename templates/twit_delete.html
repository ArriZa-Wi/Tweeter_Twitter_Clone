{% extends "base.html" %}


{% block title %}Delete Twit{% endblock title %}

{% block content %}
  <div class="card shadow-sm mb-4">
    <div class="card-header">
      <h2>Delete Twit</h2>
    </div>
    <div class="card-body">
      <form action="" method="POST">
        {% csrf_token %}
        <p>Are you sure you want to delete your Twit?</p>
        <p><strong>{{ object.body }}</strong></p>

        {% if object.image_url %}
          <div class="mt-3">
            <img src="{{ object.image_url }}" class="img-fluid rounded" alt="Twit image">
          </div>
        {% endif %}

        <div class="mt-3">
          <button class="btn btn-danger" type="submit">Confirm</button>
          <a href="{% url 'twit_list' %}" class="btn btn-outline-secondary ml-2">Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock content %}
