{% extends "base.html" %}

{% block title %}delete twit{% endblock title %}

{% block content %}
<header class="page-header">
  <span class="prompt-symbol">$</span> rm -i twit_{{ object.id }}.md
</header>

<section class="form-card">
  <h2 class="form-card-title" style="color: var(--accent-3);">confirm delete</h2>
  <p style="color: var(--text-1); font-family: var(--mono); font-size: 0.88rem;">
    // this action cannot be undone.
  </p>
  <article class="twit-card" style="margin-bottom: 20px;">
    <div class="twit-body">
      <div class="twit-content" data-markdown data-source="{{ object.body }}">{{ object.body }}</div>
      {% if object.image_url %}
        <img class="twit-image" src="{{ object.image_url }}" alt="twit image">
      {% endif %}
    </div>
  </article>
  <form method="POST" action="">
    {% csrf_token %}
    <div class="form-actions">
      <button class="btn btn-danger" type="submit">yes, delete</button>
      <a class="btn btn-ghost" href="{% url 'twit_list' %}">cancel</a>
    </div>
  </form>
</section>
{% endblock content %}
